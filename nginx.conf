server {
    listen 80;
    server_name kalkulacka.local _;   # upravit na hostname nebo IP serveru

    root /var/www/kalkulacka-reziva;
    index kalkulacka_reziva.html;

    # Gzip komprese
    gzip on;
    gzip_types text/html text/css application/javascript application/manifest+json;

    # Cache pro JS a CSS (7 dní)
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Manifest a ikony (1 den)
    location ~* \.(json|ico|png|svg)$ {
        expires 1d;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;
}
